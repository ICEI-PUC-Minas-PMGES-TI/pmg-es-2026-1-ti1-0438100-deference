<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Admin | Solidariza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/css/index.css" />
    <link rel="stylesheet" href="../../assets/css/administrador/admin.css" />
</head>
<body>
    <header><nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-2 admin-topbar"><div class="container-fluid"><a class="navbar-brand d-flex align-items-center gap-2" href="../index.html"><span class="icone-marca"><i class="bi bi-heart-fill text-white"></i></span><span class="nome-marca fw-semibold">Solidariza</span></a><button class="navbar-toggler border-0 d-lg-none" type="button" id="btnToggleSidebar"><i class="bi bi-list"></i></button><div class="collapse navbar-collapse"><ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3 mt-3 mt-lg-0"><li class="nav-item"><a class="nav-link texto-nav" id="linkPerfilAdmin" href="../perfil/perfil.html"><i class="bi bi-person-circle me-1"></i><span id="nomeAdminNav">Admin</span></a></li><li class="nav-item"><a class="btn botao-sair px-3 py-2" href="#" id="btnSairAdmin"><i class="bi bi-box-arrow-right me-1"></i>Sair</a></li></ul></div></div></nav></header>
    <div class="admin-layout">
        <div class="admin-sidebar-wrapper" id="sidebarWrapper"><aside class="admin-sidebar" id="sidebar"><button class="btn btn-sm d-lg-none mb-2" id="btnCloseSidebar" type="button"><i class="bi bi-x-lg"></i></button><nav><a class="sidebar-link" data-menu="dashboard" href="./dashboard-admin.html"><i class="bi bi-graph-up"></i>Dashboard</a><a class="sidebar-link" data-menu="solicitacoes" href="./solicitacoes-admin.html"><i class="bi bi-inboxes"></i>Solicitacoes</a><a class="sidebar-link" data-menu="campanhas" href="./campanhas-admin.html"><i class="bi bi-megaphone"></i>Campanhas</a><a class="sidebar-link active" data-menu="usuarios" href="./usuarios-admin.html"><i class="bi bi-people"></i>Usuarios</a><a class="sidebar-link" data-menu="avisos" href="./avisos-admin.html"><i class="bi bi-bell"></i>Avisos</a></nav></aside></div>
        <div class="admin-sidebar-overlay" id="sidebarOverlay"></div>
        <main class="admin-main">
            <section class="admin-page-header mb-3"><h1>Cadastrar novo administrador</h1><p>Formulario equivalente ao cadastro comum com perfil fixo admin.</p></section>
            <section class="admin-card"><div class="card-body">
                <form id="formCadastroAdmin" class="row g-2" novalidate>
                    <div class="col-12"><input id="nome" class="form-control" placeholder="Nome completo" required></div>
                    <div class="col-12"><input id="email" type="email" class="form-control" placeholder="E-mail" required></div>
                    <div class="col-6"><input id="telefone" class="form-control" placeholder="Telefone" required></div>
                    <div class="col-6"><input id="documento" class="form-control" placeholder="CPF" required></div>
                    <div class="col-12 col-md-5"><input id="dataNascimento" type="date" class="form-control" required></div>
                    <div class="col-8 col-md-5"><input id="cidade" class="form-control" placeholder="Cidade" required></div>
                    <div class="col-4 col-md-2"><input id="estado" class="form-control" placeholder="UF" maxlength="2" required></div>
                    <div class="col-6"><input id="senha" type="password" class="form-control" placeholder="Senha" minlength="6" required></div>
                    <div class="col-6"><input id="confirmarSenha" type="password" class="form-control" placeholder="Confirmar senha" minlength="6" required></div>
                    <div class="col-12 form-check ms-1 mt-2"><input class="form-check-input" type="checkbox" id="termos" required><label class="form-check-label" for="termos">Aceito termos e politica de privacidade.</label></div>
                    <div class="col-12 d-flex gap-2"><a class="btn btn-outline-secondary flex-fill" href="./usuarios-admin.html">Cancelar</a><button class="btn btn-success flex-fill" type="submit">Cadastrar Admin</button></div>
                </form>
                <div class="alert alert-danger d-none mt-2" id="alertaCadastroAdmin"></div>
                <div class="alert alert-success d-none mt-2" id="sucessoCadastroAdmin"></div>
            </div></section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/api/api-config.js"></script>
    <script src="../../assets/js/api/auth-service.js"></script>
    <script src="../../assets/js/api/usuario-service.js"></script>
    <script src="../../assets/js/api/aviso-service.js"></script>
    <script src="../../assets/js/administrador/admin-common.js"></script>
    <script src="../../assets/js/administrador/cadastro-admin.js"></script>
</body>
</html>
