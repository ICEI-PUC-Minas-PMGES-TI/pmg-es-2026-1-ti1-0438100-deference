<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitacoes Admin | Solidariza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/css/index.css" />
    <link rel="stylesheet" href="../../assets/css/administrador/admin.css" />
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-2 admin-topbar"><div class="container-fluid"><a class="navbar-brand d-flex align-items-center gap-2" href="../index.html"><span class="icone-marca"><i class="bi bi-heart-fill text-white"></i></span><span class="nome-marca fw-semibold">Solidariza</span></a><button class="navbar-toggler border-0 d-lg-none" type="button" id="btnToggleSidebar"><i class="bi bi-list"></i></button><div class="collapse navbar-collapse"><ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3 mt-3 mt-lg-0"><li class="nav-item"><a class="nav-link texto-nav" id="linkPerfilAdmin" href="../perfil/perfil.html"><i class="bi bi-person-circle me-1"></i><span id="nomeAdminNav">Admin</span></a></li><li class="nav-item"><a class="btn botao-sair px-3 py-2" href="#" id="btnSairAdmin"><i class="bi bi-box-arrow-right me-1"></i>Sair</a></li></ul></div></div></nav>
    </header>

    <div class="admin-layout">
        <div class="admin-sidebar-wrapper" id="sidebarWrapper"><aside class="admin-sidebar" id="sidebar"><button class="btn btn-sm d-lg-none mb-2" id="btnCloseSidebar" type="button"><i class="bi bi-x-lg"></i></button><nav><a class="sidebar-link" data-menu="dashboard" href="./dashboard-admin.html"><i class="bi bi-graph-up"></i>Dashboard</a><a class="sidebar-link active" data-menu="solicitacoes" href="./solicitacoes-admin.html"><i class="bi bi-inboxes"></i>Solicitacoes</a><a class="sidebar-link" data-menu="campanhas" href="./campanhas-admin.html"><i class="bi bi-megaphone"></i>Campanhas</a><a class="sidebar-link" data-menu="usuarios" href="./usuarios-admin.html"><i class="bi bi-people"></i>Usuarios</a><a class="sidebar-link" data-menu="avisos" href="./avisos-admin.html"><i class="bi bi-bell"></i>Avisos</a></nav></aside></div>
        <div class="admin-sidebar-overlay" id="sidebarOverlay"></div>

        <main class="admin-main">
            <section class="admin-page-header mb-3"><h1>Solicitacoes</h1><p>Julgamento das solicitacoes em analise e supervisao geral.</p></section>

            <section class="admin-card mb-3"><div class="card-body"><h2 class="h6">Em analise</h2><div id="listaEmAnalise" class="admin-table-wrap"></div></div></section>

            <section class="admin-card">
                <div class="card-body">
                    <div class="admin-toolbar mb-2">
                        <select id="filtroStatusSupervisao" class="form-select form-select-sm" style="max-width:220px;">
                            <option value="todos">Todos os status</option>
                            <option value="disponivel">Disponivel</option>
                            <option value="em_desenvolvimento">Em Desenvolvimento</option>
                            <option value="concluida">Concluida</option>
                            <option value="reprovada">Reprovada</option>
                        </select>
                    </div>
                    <h2 class="h6">Supervisao geral</h2>
                    <div id="listaSupervisao" class="admin-table-wrap"></div>
                </div>
            </section>
        </main>
    </div>

    <div class="modal fade" id="modalSolicitacaoAdmin" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Detalhes da solicitacao</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div id="detalheSolicitacaoAdmin"></div>
                    <div class="mt-3" id="blocoReprovacao" style="display:none;">
                        <label for="motivoReprovacao" class="form-label">Motivo da reprovacao (obrigatorio)</label>
                        <textarea id="motivoReprovacao" class="form-control" rows="3" maxlength="280"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Fechar</button>
                    <button type="button" class="btn btn-danger" id="btnReprovarSolicitacao">Reprovar</button>
                    <button type="button" class="btn btn-success" id="btnAprovarSolicitacao">Aprovar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/api/api-config.js"></script>
    <script src="../../assets/js/api/auth-service.js"></script>
    <script src="../../assets/js/api/solicitacao-service.js"></script>
    <script src="../../assets/js/api/aviso-service.js"></script>
    <script src="../../assets/js/administrador/admin-common.js"></script>
    <script src="../../assets/js/administrador/solicitacoes-admin.js"></script>
</body>
</html>
