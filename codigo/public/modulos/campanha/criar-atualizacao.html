<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/css/index.css" />
    <link rel="stylesheet" href="../../assets/css/campanha/criar-atualizacao.css" />
    <title>Solidariza - Registrar Atualização</title>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-2">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center gap-2" href="../index.html">
                    <span class="icone-marca"><i class="bi bi-heart-fill text-white"></i></span>
                    <span class="nome-marca fw-semibold">Solidariza</span>
                </a>
            </div>
        </nav>
    </header>

    <main class="container py-4">
        <a id="linkVoltarAdmin" href="#" class="link-voltar"><i class="bi bi-arrow-left"></i> Voltar para painel da campanha</a>

        <section class="cabecalho-form">
            <h1>Registrar atualização</h1>
            <p>Compartilhe progresso, marcos e prestação de contas da campanha com transparência.</p>
        </section>

        <form id="formAtualizacao" class="card-form row g-3" novalidate>
            <div class="col-12">
                <label for="tituloAtualizacao" class="form-label">Título da atualização</label>
                <input id="tituloAtualizacao" class="form-control" minlength="5" maxlength="120" required>
            </div>

            <div class="col-12 col-md-6">
                <label for="tipoAtualizacao" class="form-label">Tipo</label>
                <select id="tipoAtualizacao" class="form-select" required>
                    <option value="">Selecione...</option>
                    <option value="progresso_geral">Progresso geral</option>
                    <option value="marco_alcancado">Marco alcançado</option>
                    <option value="prestacao_contas">Prestação de contas</option>
                    <option value="comunicado">Comunicado</option>
                </select>
            </div>

            <div class="col-12 col-md-6">
                <label for="dataOcorrencia" class="form-label">Data da atualização</label>
                <input id="dataOcorrencia" type="date" class="form-control" required>
            </div>

            <div class="col-12">
                <label for="resumoAtualizacao" class="form-label">Resumo curto</label>
                <textarea id="resumoAtualizacao" class="form-control" rows="2" maxlength="220" required></textarea>
            </div>

            <div class="col-12">
                <label for="detalhesAtualizacao" class="form-label">Descrição completa</label>
                <textarea id="detalhesAtualizacao" class="form-control" rows="5" minlength="20" required></textarea>
            </div>

            <div class="col-12 col-md-4">
                <label for="percentualConcluido" class="form-label">Percentual concluído (opcional)</label>
                <input id="percentualConcluido" type="number" class="form-control" min="0" max="100" placeholder="Ex: 65">
            </div>

            <div class="col-12 col-md-4">
                <label for="valorAplicado" class="form-label">Valor aplicado (opcional)</label>
                <input id="valorAplicado" type="text" class="form-control" placeholder="Ex: 1.250,00">
            </div>

            <div class="col-12 col-md-4">
                <label for="destinoRecurso" class="form-label">Destino do recurso (opcional)</label>
                <input id="destinoRecurso" class="form-control" maxlength="120" placeholder="Ex: Compra de cestas básicas">
            </div>

            <div class="col-12">
                <label for="proximosPassos" class="form-label">Próximos passos (opcional)</label>
                <textarea id="proximosPassos" class="form-control" rows="3" maxlength="350"></textarea>
            </div>

            <div class="col-12 d-flex gap-2 justify-content-end">
                <button type="button" id="btnCancelarAtualizacao" class="btn btn-outline-secondary">Cancelar</button>
                <button type="submit" class="btn btn-publicar">Publicar atualização</button>
            </div>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/api/api-config.js"></script>
    <script src="../../assets/js/api/auth-service.js"></script>
    <script src="../../assets/js/api/campanha-service.js"></script>
    <script src="../../assets/js/api/atualizacao-service.js"></script>
    <script src="../../assets/js/campanha/criar-atualizacao.js"></script>
</body>

</html>
