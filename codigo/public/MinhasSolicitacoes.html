<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solidariza – Minhas Solicitações</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/MinhasSolicitacoes.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </div>
    <span class="nav-name">Solidariza</span>
  </div>
  <div class="nav-links">
    <a href="#" class="nav-link">Início</a>
    <a href="#" class="nav-link">Campanhas</a>
    <a href="#" class="nav-link nav-link-profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      Meu Perfil
    </a>
    <button class="btn-sair">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sair
    </button>
  </div>
</nav>

<!-- Hero Banner -->
<div class="hero">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </div>
    <h1 class="hero-title">Minhas Solicitações</h1>
    <p class="hero-sub">Acompanhe o status das suas solicitações</p>
  </div>
</div>

<!-- Conteúdo principal -->
<div class="main-content">

  <!-- Barra de ações: botão + filtros -->
  <div class="actions-bar">
    <div class="filter-bar">
      <button class="filter-btn active" data-status="todos" onclick="filtrar('todos')">Todos</button>
      <button class="filter-btn filter-aprovado" data-status="aprovado" onclick="filtrar('aprovado')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        Aprovado
      </button>
      <button class="filter-btn filter-analise" data-status="analise" onclick="filtrar('analise')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        Em análise
      </button>
      <button class="filter-btn filter-negado" data-status="negado" onclick="filtrar('negado')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        Negado
      </button>
    </div>
    <button class="btn-nova" onclick="abrirModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Nova Solicitação
    </button>
  </div>

  <!-- Cards -->
  <div class="cards-list" id="cardsList"></div>

  <!-- Estado vazio -->
  <div class="empty-state" id="emptyState" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <p>Nenhuma solicitação encontrada para este filtro.</p>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="fecharModalFora(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-header">
      <h2 id="modalTitle">Nova Solicitação</h2>
      <button class="btn-close" onclick="fecharModal()" aria-label="Fechar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="form-group">
      <label>Tipo de Assistência</label>
      <select id="tipoAssistencia">
        <option value="">Selecione uma categoria</option>
        <option>Cestas Básicas</option>
        <option>Fundo de Ajuda Médica</option>
        <option>Material Escolar</option>
        <option>Auxílio Moradia</option>
        <option>Outro</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Data da Solicitação</label>
        <input type="date" id="dataSolicitacao">
      </div>
      <div class="form-group">
        <label>Nº de Beneficiários</label>
        <input type="number" id="numBeneficiarios" min="1" placeholder="Ex: 3">
      </div>
    </div>
    <div class="form-group">
      <label>Descrição</label>
      <textarea id="descricao" placeholder="Descreva brevemente sua necessidade..."></textarea>
    </div>
    <button class="btn-submit" onclick="enviarSolicitacao()">Enviar Solicitação</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="./assets/js/MinhasSolicitacoes.js"></script>
</body>
</html>
